<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lansky</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 760px;
      padding: 20px 24px 12px;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #a0c4ff;
    }

    header p {
      font-size: 0.75rem;
      color: #555;
      margin-top: 2px;
    }

    #chat {
      flex: 1;
      width: 100%;
      max-width: 760px;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 88%;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.88rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: #1a3a5c;
      color: #d6eaff;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant .bubble {
      background: #1c1c1c;
      color: #e8e8e8;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    .msg.assistant .bubble.streaming::after {
      content: "▋";
      animation: blink 0.8s step-end infinite;
      color: #a0c4ff;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .label {
      font-size: 0.68rem;
      color: #444;
      padding: 0 4px;
    }

    #form {
      width: 100%;
      max-width: 760px;
      padding: 12px 24px 24px;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e8e8e8;
      font-size: 0.88rem;
      padding: 10px 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      font-family: inherit;
    }

    #input:focus { border-color: #3a6fa8; }
    #input::placeholder { color: #444; }

    #send {
      background: #1a3a5c;
      color: #a0c4ff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.88rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    #send:hover { background: #1f4a7a; }
    #send:disabled { opacity: 0.4; cursor: default; }

    #status {
      font-size: 0.72rem;
      color: #555;
      padding: 0 24px 6px;
      width: 100%;
      max-width: 760px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>

<header>
  <h1>LANSKY</h1>
  <p>Personal finance intelligence</p>
</header>

<div id="chat"></div>
<div id="status"></div>

<form id="form">
  <textarea id="input" rows="1" placeholder="Ask about your finances…" autocomplete="off"></textarea>
  <button id="send" type="submit">Send</button>
</form>

<script>
  const chat   = document.getElementById('chat');
  const form   = document.getElementById('form');
  const input  = document.getElementById('input');
  const send   = document.getElementById('send');
  const status = document.getElementById('status');

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // Submit on Enter (Shift+Enter = newline)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  function appendMessage(role, text, streaming = false) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'You' : 'Lansky';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (streaming ? ' streaming' : '');
    bubble.textContent = text;

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function setStatus(msg) { status.textContent = msg; }

  // On load, trigger proactive check
  window.addEventListener('load', () => {
    sendMessage('Hello! Are there any transactions I should know about?');
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    sendMessage(text);
  });

  async function sendMessage(text) {
    send.disabled = true;
    appendMessage('user', text);
    setStatus('Lansky is thinking…');

    const bubble = appendMessage('assistant', '', true);

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      if (!resp.ok) {
        bubble.textContent = `Error ${resp.status}: ${await resp.text()}`;
        bubble.classList.remove('streaming');
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let full = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        full += decoder.decode(value, { stream: true });
        bubble.textContent = full;
        chat.scrollTop = chat.scrollHeight;
      }

      bubble.classList.remove('streaming');
      setStatus('');
    } catch (err) {
      bubble.textContent = `Connection error: ${err.message}`;
      bubble.classList.remove('streaming');
      setStatus('');
    } finally {
      send.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
